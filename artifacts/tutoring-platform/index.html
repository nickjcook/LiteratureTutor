    <script>
      // Apply saved display/accessibility preferences before first paint to
      // avoid a flash of the default theme. Mirrors src/lib/preferences.tsx.
      (function () {
        try {
          var d = { theme: "system", contrast: "normal", colorBlind: "off", textSize: "normal" };
          var raw = localStorage.getItem("pr-display-preferences");
          var p = raw ? Object.assign(d, JSON.parse(raw)) : d;
          var el = document.documentElement;
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = p.theme === "dark" || (p.theme === "system" && prefersDark);
          el.classList.toggle("dark", dark);
          el.classList.toggle("hc", p.contrast === "high");
          el.classList.toggle("cb", p.colorBlind === "on");
          el.dataset.textSize = p.textSize;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
