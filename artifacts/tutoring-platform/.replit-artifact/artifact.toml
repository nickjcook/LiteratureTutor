kind = "web"
previewPath = "/"
title = "WA English & Literature ATAR Tutoring Platform"
version = "1.0.0"
id = "artifacts/tutoring-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24689

[services.development]
run = "pnpm --filter @workspace/tutoring-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tutoring-platform", "run", "build" ]
publicDir = "artifacts/tutoring-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24689"
BASE_PATH = "/"
